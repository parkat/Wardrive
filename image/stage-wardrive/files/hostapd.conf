# hostapd.conf — WiFi AP fallback for wardrive Pi
# Used when no uplink is available so you can reach the UI wirelessly.
# Internal wlan0 is used for AP; external wlan1 is used for monitoring.

interface=wlan0
driver=nl80211
ssid=rpiwifi2_4ghz
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=wardrivelocal
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
country_code=US
