name: Build Wardrive Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout wardrive repo
        uses: actions/checkout@v4
        with:
          path: wardrive

      - name: Clone pi-gen
        run: |
          git clone --depth=1 -b arm64 \
            https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Copy wardrive stage into pi-gen
        run: |
          cp -r wardrive/image/stage-wardrive pi-gen/stage-wardrive
          chmod +x pi-gen/stage-wardrive/01-wardrive/00-run.sh

      - name: Write pi-gen config
        run: |
          cat > pi-gen/config << 'EOF'
          IMG_NAME="wardrive-pi"
          RELEASE=bookworm
          DEPLOY_COMPRESSION=xz
          LOCALE_DEFAULT=en_US.UTF-8
          TARGET_HOSTNAME=wardrive
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=America/New_York
          FIRST_USER_NAME=wardrive
          FIRST_USER_PASS=wardrive
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage-wardrive"
          EOF

      - name: Build image with Docker
        run: |
          cd pi-gen
          ./build-docker.sh
        env:
          PRESERVE_CONTAINER: 0

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wardrive-pi-image
          path: pi-gen/deploy/wardrive-pi*.img.xz
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pi-gen/deploy/wardrive-pi*.img.xz
          generate_release_notes: true
