name: Build Wardrive Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout wardrive repo
        uses: actions/checkout@v4
        with:
          path: wardrive

      - name: Clone pi-gen
        run: |
          git clone --depth=1 -b arm64 \
            https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            quilt parted qemu-user-static debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin rsync xz-utils \
            file curl bc gpg pigz arch-test binfmt-support \
            debian-archive-keyring

      - name: Copy wardrive stage into pi-gen
        run: |
          cp -r wardrive/image/stage-wardrive pi-gen/stage-wardrive
          chmod +x pi-gen/stage-wardrive/01-wardrive/00-run.sh
          cp wardrive/image/pigen-config pi-gen/config

      - name: Build image
        run: |
          cd pi-gen
          sudo bash build.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wardrive-pi-image
          path: pi-gen/deploy/wardrive-pi*.img.xz
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pi-gen/deploy/wardrive-pi*.img.xz
          generate_release_notes: true
