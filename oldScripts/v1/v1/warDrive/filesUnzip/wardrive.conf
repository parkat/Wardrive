# wardrive.conf — editable configuration for the warDrive capture system.
# Sourced by wardrive.sh. Bash syntax; no spaces around '='.

# ── Session ────────────────────────────────────────────────────────────────────
SESSION_LABEL="wardrive"          # appended to the timestamp folder name

# ── WiFi (Kismet) ──────────────────────────────────────────────────────────────
ENABLE_WIFI=false
WIFI_INTERFACE="wlan0"            # set to your monitor-mode interface

# ── SDR (rtl_433) ─────────────────────────────────────────────────────────────
ENABLE_SDR=false
SDR_FREQUENCY_MHZ="433.92"       # 433.92 MHz (EU/US ISM band)
                                  # alternatives: 315, 868, 915

# ── ESP32 BLE ─────────────────────────────────────────────────────────────────
ENABLE_ESP32=true

# Serial port of the ESP32.
# Leave blank to auto-detect (tries /dev/ttyUSB0, ttyUSB1, ttyACM0, ttyACM1).
ESP32_DEVICE=""

# Baud rate. Must match SERIAL_BAUD defined in the firmware (.ino).
# 921600 is recommended. Fall back to 115200 if you see garbled output.
ESP32_BAUD=921600
