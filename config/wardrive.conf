# wardrive.conf — configuration for the warDrive capture system.
# Sourced by wardrive.sh (legacy) and parsed by the Python supervisor.
# Bash-compatible syntax: no spaces around '='.

# ── Session ────────────────────────────────────────────────────────────────────
SESSION_LABEL=wardrive
KEEP_AWAKE=true

# ── Storage ────────────────────────────────────────────────────────────────────
# USB drive label. If a drive with this label is mounted, data goes there.
# Falls back to DATA_FALLBACK_DIR if the drive is not present.
USB_DRIVE_LABEL=WARDRIVE
DATA_FALLBACK_DIR=/opt/wardrive/data
# Legacy: leave blank — resolved at runtime from USB_DRIVE_LABEL.
CAPTURE_BASE_DIR=

# ── USB Power budget ───────────────────────────────────────────────────────────
# Total mA budget across all USB ports.
# Pi 3B default: 600 mA. With max_usb_current=1 in /boot/config.txt: ~1200 mA.
# Keep headroom below the actual limit to avoid triggering over-current.
USB_BUDGET_MA=900

# ── Collector priorities (lower number = higher priority) ──────────────────────
# If USB budget is exceeded, the lowest-priority running collector is shed first.
PRIORITY_GPS=1
PRIORITY_WIFI=2
PRIORITY_ESP32=3
PRIORITY_RTL433=4
PRIORITY_WIDEBAND=4
PRIORITY_HACKRF=5

# ── Supervisor tunables ────────────────────────────────────────────────────────
RESTART_MAX=10
RESTART_BACKOFF_INITIAL=2
RESTART_BACKOFF_MAX=60
RESTART_RESET_AFTER=300
# Seconds without any stdout/stderr before a collector is declared hung and killed
HANG_TIMEOUT=120

# ── WiFi (Kismet) ──────────────────────────────────────────────────────────────
ENABLE_WIFI=true
WIFI_INTERFACE=wlan1

# ── SDR — rtl433 or wideband (same dongle, mutex enforced) ────────────────────
ENABLE_SDR=true
# SDR_MODE: rtl433 or wideband. Toggleable from the UI during a drive.
SDR_MODE=rtl433
SDR_FREQUENCY_MHZ=433.92

WIDEBAND_FREQ_START_MHZ=100
WIDEBAND_FREQ_END_MHZ=1700
WIDEBAND_SCAN_STEP_MHZ=2
WIDEBAND_SCAN_TIME=1
WIDEBAND_PEAK_THRESHOLD=-40

# ── ESP32 BLE ──────────────────────────────────────────────────────────────────
ENABLE_ESP32=true
# Leave blank to auto-detect (tries /dev/ttyUSB0, ttyUSB1, ttyACM0, ttyACM1).
ESP32_DEVICE=
ESP32_BAUD=115200

# ── GPS ────────────────────────────────────────────────────────────────────────
ENABLE_GPS=true
GPS_DEVICE=/dev/ttyACM0
GPS_WAIT_FIX=30
GPS_MIN_SATS=4

# ── HackRF (stub — enable when hardware arrives) ───────────────────────────────
ENABLE_HACKRF=false

# ── WiFi Access Point fallback ─────────────────────────────────────────────────
# When no uplink is detected at boot, the Pi broadcasts this AP so you can
# reach the web UI. Uses the internal wlan0 interface.
AP_SSID=rpiwifi2_4ghz
AP_PASSPHRASE=wardrivelocal
AP_CHANNEL=6
AP_IP=192.168.88.1

# ── Debug API ──────────────────────────────────────────────────────────────────
# Bearer token for /api/debug/* endpoints. Change this before deploying.
DEBUG_TOKEN=changeme-set-a-real-token

# ── Wigle.net API (optional) ───────────────────────────────────────────────────
WIGLE_API_KEY=
ENABLE_DEFLOCK=true

