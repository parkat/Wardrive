# wardrive.conf — editable configuration for the warDrive capture system.
# Sourced by wardrive.sh. Bash syntax; no spaces around '='.

# ── Session ────────────────────────────────────────────────────────────────────
SESSION_LABEL="wardrive"          # appended to the timestamp folder name
KEEP_AWAKE=true   # set false to allow normal sleep/lid during capture

# ── WiFi (Kismet) ──────────────────────────────────────────────────────────────
ENABLE_WIFI=true
WIFI_INTERFACE="wlan1"            # set to your monitor-mode interface

# ── SDR (rtl_433) ─────────────────────────────────────────────────────────────
ENABLE_SDR=true
SDR_FREQUENCY_MHZ="433.92"       # 433.92 MHz (EU/US ISM band)
                                  # alternatives: 315, 868, 915

# ── Wideband SDR (600-6000 MHz spectrum scanner) ───────────────────────────
# Experimental: scans for interesting signals, locks onto peaks, then rescans
ENABLE_WIDEBAND_SDR=false
WIDEBAND_FREQ_START_MHZ=600      # scan start frequency
WIDEBAND_FREQ_END_MHZ=6000       # scan end frequency
WIDEBAND_SCAN_STEP_MHZ=1         # resolution (smaller = slower but more detailed)
WIDEBAND_SCAN_TIME=10            # seconds per scan pass
WIDEBAND_LOCKUP_TIME=30          # seconds to record when signal is interesting
WIDEBAND_PEAK_THRESHOLD=-40      # dBm threshold for "interesting" signals

# ── Wigle.net API (optional) ──────────────────────────────────────────────────
# Enables BLE device sighting lookup during enrichment.
# Get your token from wigle.net → Account → "API Token" tab.
# It's a base64 string that looks like: dXNlcm5hbWU6YXBpVG9rZW4=
# Leave blank to skip Wigle lookups.
WIGLE_API_KEY=""                          # paste your base64 token here to enable

# ── deflock.me ALPR database (optional, no key required) ──────────────────────
# Enables ALPR camera location enrichment (public civil-liberties database).
# Enrichment will query deflock.me for known ALPR cameras near GPS fixes.
# This is a public API with no authentication required.
ENABLE_DEFLOCK=true

# ── ESP32 BLE ─────────────────────────────────────────────────────────────────
ENABLE_ESP32=true

# Serial port of the ESP32.
# Leave blank to auto-detect (tries /dev/ttyUSB0, ttyUSB1, ttyACM0, ttyACM1).
ESP32_DEVICE=""

# Baud rate. Must match SERIAL_BAUD defined in the firmware (.ino).
# 921600 is recommended. Fall back to 115200 if you see garbled output.
ESP32_BAUD=115200

#-----GPS------------

ENABLE_GPS=true
GPS_DEVICE=/dev/ttyACM0      # u-blox 7 on ttyACM0
GPS_WAIT_FIX=30              # seconds to wait for initial fix at session start
GPS_MIN_SATS=4               # minimum satellites for a trustworthy position
#--------------------
